# Streamlit reverse proxy + basic auth
# Streamlit은 websocket(_stcore/stream)을 쓰므로 Upgrade 헤더 필수.

server {
    listen 80;
    server_name _;

    # 업로드 한도 (감사 데이터 대용량 대비, .streamlit maxUploadSize와 정합)
    client_max_body_size 1024M;

    # 무단 접근 차단 — 아이디/비밀번호 (htpasswd)
    auth_basic "Audit Demo - Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://app:8501;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit websocket 업그레이드
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 장시간 세션(분석 대기) 대비 타임아웃 연장
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
