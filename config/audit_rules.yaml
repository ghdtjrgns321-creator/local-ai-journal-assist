# config/audit_rules.yaml
# 감사 패턴 피처에 사용되는 업무 룰 — ERP/회사별 커스터마이징 필요
# Phase 1c에서 Streamlit UI로 편집 가능, 고객사 프로파일에 저장됨

patterns:
  # L3-02: 수기 전표 식별 코드 (source 컬럼 기준)
  # DataSynth v1.2.0 source 값: automated, manual, recurring, adjustment
  # SA는 document_type이므로 제거, Adjustment(결산 조정 수기) 추가
  manual_source_codes:
    - "Manual"
    - "Adjustment"

  # L3-10: standalone high-risk account usage.
  # Customize these per client CoA.
  high_risk_account_use:
    accounts:
      - "1190"
      - "2190"
    account_prefixes:
      - "111"
      - "112"
      - "113"
    # User-adjustable sensitive account families for Phase 1 review queues.
    # These group names are surfaced in L3-10 annotations and can be tuned per client CoA.
    sensitive_account_groups:
      cash_equivalent:
        accounts: []
        account_prefixes:
          - "111"
          - "112"
          - "113"
      suspense_clearing:
        accounts:
          - "1190"
          - "2190"
        account_prefixes: []
      employee_advance_loan:
        accounts: []
        account_prefixes: []
      prepaid_deferred:
        accounts: []
        account_prefixes: []
      voucher_coupon:
        accounts: []
        account_prefixes: []

  # L1-05: only system-driven self-approval is allowed by default.
  # Approval omission is handled by L1-07, so this section only defines explicit allow cases.
  self_approval_allow:
    user_personas:
      - "automated_system"
    company_codes: []
    sources:
      - "automated"

  # L1-05: human self-approval is always detected, but some areas default to review-required
  # instead of immediate violation. Adjust these buckets per client policy.
  self_approval_review:
    company_codes: []
    document_types: []
    business_processes:
      - "R2R"
      - "A2R"

  # L1-05: even in review-eligible processes, escalate to immediate violation
  # when the self-approval is too large, happens in abnormal time, or touches
  # accounts that should not be self-approved.
  self_approval_immediate_override:
    # Performance materiality placeholder.
    # 1,000,000,000 KRW is not a universal "correct" threshold.
    # Replace this with the engagement-specific performance materiality
    # as soon as the audit team finalizes it.
    materiality_amount: 1000000000
    # "Large manual JE" escalation applies only to manual/adjustment sources.
    manual_sources:
      - "manual"
      - "adjustment"
    # Exact high-risk accounts. These are conservative starter defaults only.
    # Customize to the client's CoA.
    high_risk_accounts:
      - "1190"   # 가지급금
      - "2190"   # 가수금
    # Prefix-based high-risk accounts. Conservative starter defaults for
    # cash / cash-equivalent style accounts in common KR CoA layouts.
    # Customize to the client's CoA.
    high_risk_account_prefixes:
      - "111"
      - "112"
      - "113"

  # L4-01: 매출 계정 접두사 (K-IFRS 기준 4xxx가 표준)
  # 영업외수익(9), 글로벌 본사 기준(5) 등 추가 가능
  revenue_account_prefixes:
    - "4"

  # L3-04: 기말/기초 대규모 전표 운영 설정.
  # 결산 일정(period_end_margin_days)은 config/settings.py에서 정하고,
  # 정상 반복 마감전표 제외는 아래 whitelist 후보를 감사인이 승인한 뒤 입력한다.
  # 예시:
  # period_end_whitelist:
  #   - name: "월말 감가상각 자동전표"
  #     source: ["batch", "system"]
  #     created_by: ["SAP_BATCH"]
  #     document_type: ["AF"]
  #     account_group: ["depreciation", "fixed_assets"]
  #     description_contains: ["감가상각", "depreciation"]
  period_end_whitelist: []

  # L3-04: 결산 민감 계정군. 플래그 대상을 늘리지는 않고,
  # 이미 L3-04에 걸린 전표의 우선순위/점수만 올린다.
  period_end_sensitive_accounts:
    account_groups:
      - "revenue"
      - "inventory"
      - "allowance"
      - "receivable"
      - "payable"
      - "impairment"
    account_prefixes:
      - "4"     # 매출/수익
      - "12"    # 재고
      - "1150"  # 미수/관계사 채권 예시
      - "2050"  # 미지급/관계사 채무 예시
      - "2700"  # 미지급/발생액 예시
    accounts: []

  # L2-04: 비용 자산화 탐지용 계정 분류.
  # 기본값은 보수적인 시작점일 뿐이며, 회사별 CoA에 맞게 조정해야 한다.
  expense_capitalization:
    asset_account_prefixes:
      - "15"
    expense_account_prefixes:
      - "5"
      - "6"
      - "7"
      - "8"
    normal_capitalization_keywords:
      - "capex"
      - "capital"
      - "project"
      - "development"
      - "construction"
      - "software"
      - "license"
      - "설비"
      - "투자"
      - "개발"
      - "건설"
      - "구축"
      - "자본적"
      - "프로젝트"
    suspicious_expense_keywords:
      - "rent"
      - "repair"
      - "maintenance"
      - "travel"
      - "welfare"
      - "fee"
      - "utility"
      - "office"
      - "training"
      - "광고"
      - "복리후생"
      - "여비"
      - "수선"
      - "지급수수료"
      - "소모품"
      - "통신"
      - "수도광열"
    normal_document_types:
      - "AA"
      - "FA"
    suspicious_sources:
      - "manual"
      - "adjustment"
    suspicious_processes:
      - "P2P"
      - "O2C"
      - "R2R"
      - "H2R"

  # L3-03 + WU-07: 관계사 식별 — IC 계정 쌍 (receivable <-> payable)
  # Why: 클라이언트별 CoA 체계가 다르므로 코드 하드코딩 금지, YAML에서 관리
  # 매칭 로직: receivable 쪽 sum(debit) vs payable 쪽 sum(credit) 그룹 대사
  intercompany:
    pairs:
      - receivable: "1150"    # IC Receivable (관계사 채권)
        payable: "2050"       # IC Payable (관계사 채무)
      - receivable: "4500"    # IC Revenue (관계사 매출)
        payable: "2700"       # IC Accrued (관계사 미지급)

  # L1-06: 직무분리(SoD) 위반 — 하이브리드 로직
  # Rule B: 프로세스 간 상충 쌍 (직급 불문, 즉시 Critical)
  # Why: generation_principles §3.4 — 비현실적 겸직 쌍, 횡령 루트
  sod_toxic_pairs:
    - ["TRE", "P2P"]    # 자금 집행 + 매입 → 가짜 AP + 직접 이체
    - ["TRE", "O2C"]    # 자금 집행 + 수금 → 입금 가로채기 + 대손 세탁
    - ["O2C", "P2P"]    # 매출 + 매입 → 순환거래(Round-tripping)
    - ["H2R", "O2C"]    # 급여 + 매출 → 유령직원 + 가공 커미션
    - ["H2R", "P2P"]    # 급여 + 매입 → 리베이트 + 급여 세탁

  # Rule A: 직급별 프로세스 수 임계값 (toxic pair 미해당 시 적용)
  # value = 초과 시 위반 (예: junior 1 → 2개 이상이면 위반)
  # 운영 기본값은 교과서적 SoD 4기능
  # (승인/기록/자산보관/조정)을 현재 프로세스 체계에 매핑한 6쌍을 사용한다.
  sod_toxic_pairs:
    - ["TRE", "P2P"]    # 지급 실행 + 매입/지급 처리
    - ["TRE", "O2C"]    # 자금 이동/수납 통제 + 매출채권/수금 처리
    - ["TRE", "H2R"]    # 급여 처리 + 실제 지급/은행 통제
    - ["R2R", "TRE"]    # 총계정원장/분개 + 자금/은행 통제
    - ["R2R", "P2P"]    # 총계정원장/분개 + 매입채무 처리
    - ["R2R", "O2C"]    # 총계정원장/분개 + 매출채권/수금 처리

  sod_role_thresholds:
    junior_accountant: 1     # 1인 1프로세스 전담
    senior_accountant: 3     # 기본 1 + 겸직 2까지 허용
    # controller, manager, automated_system: 제한 없음 (toxic pair만 감시)

  # L2-04/L3-08: 가계정/미결산계정 키워드 (정규식 지원)
  # 한글 키워드: 정확 포함 일치 / 영문 키워드: [Xx] 형태로 대소문자 무관 매칭
  # DataSynth v1.2.0 적요가 영문이므로 영문 키워드 병기
  suspense_keywords:
    - "가수금"
    - "가지급"
    - "가계정"
    - "미결산"
    - "임시"
    - "[Ss]uspense"
    - "[Cc]learing"
    - "[Tt]emporary"
    - "[Uu]nallocated"
    - "[Mm]iscellaneous"

  # L2-05: 정상 청산/반제 계정 — 역분개 탐지 제외 (S1/S2에서 필터링)
  # GR/IR 청산, IC 정산 등 동일 금액 반대 전표가 정상 프로세스인 계정
  reversal_exclude_accounts:
    - "2900"    # GR/IR 청산계정 (Goods Receipt / Invoice Receipt)
    - "1150"    # IC Receivable 정산
    - "2050"    # IC Payable 정산

  # L2-05: 역분개 적요 키워드 (한/영)
  # line_text에서 매칭 → S4 서브 신호
  reversal_keywords:
    - "수정"
    - "정정"
    - "오류"
    - "역분개"
    - "결산조정"
    - "취소"
    - "원복"
    - "대체"
    - "재전기"
    - "환입"
    - "[Rr]eversal"
    - "[Cc]ancel"
    - "[Cc]orrect"
    - "[Aa]djust"
    - "[Rr]estate"
    - "[Ee]rror"
    - "[Vv]oid"
    - "[Ww]rite.off"

  # L2-04/L3-08: 가계정/청산계정 GL 코드 prefix (gl_account 기반 판별)
  # 텍스트 키워드 매칭과 OR 결합 — 실무에서는 GL 코드가 1순위 탐지 기준
  # K-IFRS 기준 가계정/청산계정 대역, 회사 CoA에 맞춰 조정
  suspense_account_codes:
    - "1190"    # 가지급금 (Suspense Receivable)
    - "1290"    # 선급금 미정리
    - "2190"    # 가수금 (Suspense Payable)
    - "2900"    # GR/IR 청산계정
    - "9990"    # 임시/잡계정

# WU-16: TrendBreak — 회계추정치 편의(bias) 탐지 대상 계정
# ISA 540 소급 검토 대상: 충당금, 감가상각, 보증 관련 추정치 계정
# K-IFRS 기준, 회사 CoA에 맞춰 조정 필요
# sign: 정상 잔액 방향 (credit_normal=대변정상, debit_normal=차변정상)
estimation_accounts:
  # 자산 차감 계정 (대변 정상)
  - account: "1020"
    name: "대손충당금"
    sign: "credit_normal"
  - account: "1599"
    name: "감가상각누계액"
    sign: "credit_normal"
  - account: "100660"
    name: "대손충당금(유동)"
    sign: "credit_normal"
  - account: "100670"
    name: "유동자산 평가충당금"
    sign: "credit_normal"
  # 부채 계정 (대변 정상)
  - account: "2200"
    name: "퇴직급여충당부채"
    sign: "credit_normal"
  - account: "2300"
    name: "장기충당부채"
    sign: "credit_normal"
  - account: "200380"
    name: "단기충당부채"
    sign: "credit_normal"
  - account: "200390"
    name: "판매보증충당부채(유동)"
    sign: "credit_normal"
  - account: "200400"
    name: "공사손실충당부채(유동)"
    sign: "credit_normal"
  - account: "200410"
    name: "반품충당부채"
    sign: "credit_normal"
  - account: "200420"
    name: "하자보수충당부채(유동)"
    sign: "credit_normal"
  - account: "200430"
    name: "소송충당부채(유동)"
    sign: "credit_normal"
  - account: "200440"
    name: "복구충당부채(유동)"
    sign: "credit_normal"

# WU-15: Access Audit — 접근감사/감사추적 (AL1-01~AL3-01)
access_audit:
  # AL1-01: 기말 수정 감시 대상 필드 (change_log.changed_field 기준)
  modification_watched_fields:
    - "line_text"
    - "header_text"
    - "gl_account"
    - "debit_amount"
    - "credit_amount"

  # AL1-03: 전표번호 갭 적법 사유 제외 전표유형
  gap_exclude_doc_types:
    - "ST"     # Storno (역분개)
    - "MG"     # Migration

  # AL3-01: 승인 지연 임계 (영업일)
  approval_delay_days: 3

# WU-13: TB 교차검증 — 계정 유형별 GL 접두사 (재무제표-장부 대사)
# 회사 CoA 체계에 맞춰 조정 필요, 회사별 audit_rules.yaml에서 오버라이드 가능
reconciliation_account_prefixes:
  AR: ["11"]       # 매출채권 (1100번대)
  AP: ["21"]       # 매입채무 (2100번대)
  FA: ["15"]       # 고정자산 (1500번대)

# GL 계정 코드 → CoA 상위그룹 매핑 (K-IFRS 기준)
# Z-score 소그룹(n<30) fallback 시 상위그룹 통계 사용
# 회사 CoA 체계에 맞춰 조정 필요
coa_category_prefixes:
  asset: ["1"]       # 1xxx = 자산
  liability: ["2"]   # 2xxx = 부채
  equity: ["3"]      # 3xxx = 자본
  revenue: ["4"]     # 4xxx = 수익
  expense: ["5", "6", "7", "8"]     # 5xxx~8xxx = 비용/원가/판관비

# L3-01: 계정 분류 불일치. 확정 오류가 아니라 review-needed 신호.
# 회사별 CoA가 다르면 회사 audit_rules.yaml에서 이 블록을 오버라이드한다.
l3_01_misclassified_account:
  enabled: true
  strict_allowed_categories: false
  # 운영 기본값은 보수적으로 유지한다.
  # 1) process_denied_accounts가 있으면 exact account 기준으로 우선 판정
  # 2) exact account가 없는 프로세스만 process_disallowed_categories fallback 사용
  # 3) process_allowed_keywords는 정상 예외 적요를 보수적으로 완화한다
  # 3) 이 값들은 고객사 CoA 기준으로 반드시 override 가능해야 한다
  account_category_prefixes:
    asset: ["1"]
    liability: ["2"]
    equity: ["3"]
    revenue: ["4"]
    expense: ["5", "6", "7", "8"]
    payroll: ["54", "64", "74"]
    inventory: ["12"]
  process_denied_accounts:
    O2C:
      - "500000"
      - "500060"
      - "500070"
      - "500120"
      - "500150"
      - "500160"
      - "500230"
      - "500270"
      - "500380"
      - "500410"
      - "500480"
      - "500500"
      - "500590"
      - "500600"
      - "500670"
      - "500680"
      - "500720"
      - "500830"
      - "500920"
      - "500960"
      - "6800"
    P2P:
      - "400030"
      - "400100"
      - "400170"
      - "400210"
      - "400270"
      - "400380"
      - "400410"
      - "400520"
      - "400650"
      - "400660"
      - "400700"
      - "400710"
      - "400780"
      - "4100"
    H2R:
      - "400030"
      - "400260"
      - "400440"
      - "400490"
      - "400570"
      - "400710"
      - "400730"
    TRE: ["1200", "1290"]
    A2R: ["6400"]
  # Optional: 정상 예외 적요를 아주 보수적으로만 넣는다.
  # 기본값은 비워 둔다. 기본 세팅에서 recall을 깎으면 안 되기 때문이다.
  # 예시:
  # process_allowed_keywords:
  #   O2C: ["매출에누리", "판매수수료", "rebate"]
  #   H2R: ["주식보상", "퇴직급여"]
  #   TRE: ["clearing", "transfer"]
  process_allowed_keywords: {}
  process_disallowed_categories:
    O2C: ["expense"]
    P2P: ["revenue"]
    H2R: ["revenue"]
    TRE: ["inventory"]
    A2R: ["payroll"]
  process_allowed_categories:
    O2C: ["revenue", "asset", "liability"]
    P2P: ["expense", "asset", "liability", "inventory"]
    H2R: ["payroll", "expense", "liability", "asset"]
    TRE: ["asset", "liability", "equity"]
    A2R: ["asset", "liability", "expense"]
    R2R: ["asset", "liability", "equity", "revenue", "expense", "payroll", "inventory"]

# Evidence: 증빙/컷오프/금액 탐지 (WU-14)
evidence:
  # EV01: 한국 세법 적격증빙 유형
  # 3만원 초과 거래는 아래 유형 중 하나가 있어야 적격
  qualified_doc_types:
    - "tax_invoice"          # 세금계산서
    - "credit_card"          # 신용카드 매출전표
    - "cash_receipt"         # 현금영수증
    - "electronic_invoice"   # 전자세금계산서
  # L3-11: 비용 계정 접두사 (컷오프 비용 대상)
  expense_account_prefixes:
    - "5"

# 통화별 소수점 자릿수 — is_round_number 판정에 사용
# Why: 외화 거래에서 USD $10,000,000.00은 라운드넘버지만
#      round(0) 적용 시 소수점 이하가 무시되어 판정 왜곡 발생
currency_decimals:
  KRW: 0    # 한국원: 정수
