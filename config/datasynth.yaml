# DataSynth 설정 — Local AI Audit Assistant 프로젝트용
# K-IFRS 적용 한국 중견 제조 그룹사 (3법인) 시뮬레이션
# 실행: cd tools/datasynth && ./target/release/datasynth-data generate -c ../../config/datasynth.yaml -o ../../data/journal/primary/datasynth --seed 2024 --verbose

global:
  seed: 2024
  industry: manufacturing
  start_date: "2022-01-01"
  period_months: 36
  group_currency: KRW
  parallel: true

companies:
  - code: "C001"
    name: "KR Manufacturing HQ"
    currency: KRW
    country: KR
    fiscal_year_variant: K4
    annual_transaction_volume: hundred_k
    volume_weight: 1.0
  - code: "C002"
    name: "KR Manufacturing Ulsan"
    currency: KRW
    country: KR
    fiscal_year_variant: K4
    annual_transaction_volume: ten_k
    volume_weight: 0.3
  - code: "C003"
    name: "KR Manufacturing Cheonan"
    currency: KRW
    country: KR
    fiscal_year_variant: K4
    annual_transaction_volume: ten_k
    volume_weight: 0.3

chart_of_accounts:
  complexity: medium
  industry_specific: true

master_data:
  vendors:
    count: 500
  customers:
    count: 300
  employees:
    count: 300

# B07 SOD 과탐 해소: JE 작성자 풀 150명 (기본 40명 → 전원 위반 문제)
# K-IFRS 적용 중견 제조 그룹사(3법인) 기준
user_personas:
  users_per_persona:
    junior_accountant: 60
    senior_accountant: 30
    controller: 10
    manager: 10
    automated_system: 40

# B04 중복 지급 탐지용 document flow 활성화
document_flows:
  p2p:
    enabled: true
  o2c:
    enabled: true

# B10 관계사 순환거래 탐지용
intercompany:
  enabled: true
  ic_transaction_rate: 0.10
  generate_matched_pairs: true

# KRW 금액 스케일 — 한국 중견 제조업 기준
# LogNormal(14.0, 2.5) → 중앙값 ~120만원, 평균 ~2,900만원
# B02 승인한도 직하 탐지: split_transaction이 threshold×0.9~threshold 구간 생성
# A01 차대변 균형 — ERP ITAC 반영 (99.8% 일치, 불일치는 A01 탐지 테스트용 극소수)
# debit_credit_distribution은 차변/대변 라인 수 분포 (금액 균형은 JE 생성 시 항상 보장)
transactions:
  # 주말/공휴일 전표 비율 — C02/C03 주말 탐지 테스트용
  seasonality:
    weekend_activity: 1.0    # 주말 가중치 (1.0 = 평일과 동등, 월말 스파이크로 자연 감소 → ~10%)
    holiday_activity: 0.05
    month_end_spike: true
    month_end_multiplier: 2.5
    month_end_lead_days: 5
    quarter_end_spike: true
    quarter_end_multiplier: 4.0
    year_end_spike: true
    year_end_multiplier: 6.0
    day_of_week_patterns: true
    monday_multiplier: 1.3
    tuesday_multiplier: 1.1
    wednesday_multiplier: 1.0
    thursday_multiplier: 1.0
    friday_multiplier: 0.85
  debit_credit_distribution:
    equal: 0.998
    more_debit: 0.001
    more_credit: 0.001
  amounts:
    min_amount: 100
    max_amount: 100000000000    # 1,000억원 (대기업 단일 전표 상한)
    lognormal_mu: 14.0          # ln(1,200,000) ≈ 14.0 → 중앙값 ~120만원
    lognormal_sigma: 2.5
    decimal_places: 0           # 원화는 소수점 없음
    round_number_probability: 0.25
    nice_number_probability: 0.15
    round_number_unit: 10000         # T4-11: 1만원 단위 (100000→10000, 목표 15~35%)
    nice_number_unit: 1000           # T4-12: 천원 단위 (10000→1000, 목표 10~25%)
  benford:
    enabled: true
    tolerance: 0.05
    exempt_sources: [recurring, payroll]

# C02/C03 시간대 탐지용 — DETECTION_REFERENCE.md §6.5 반영
# 한국 야근 문화: 18:30~22:00은 결산기 정상, 22:00~06:00이 심야(고위험)
temporal_patterns:
  enabled: true
  # T4-03/14/21: 12월 스파이크 해소 — PeriodEndDynamics 명시 활성화
  # 한국 중견 제조업 결산기: 12월 마감 20일전부터 야근, 전표 폭증
  period_end:
    model: exponential
    month_end:
      start_day: -5
      base_multiplier: 1.0
      peak_multiplier: 2.5
      decay_rate: 0.3
    quarter_end:
      start_day: -10
      base_multiplier: 1.0
      peak_multiplier: 4.0
      decay_rate: 0.3
    year_end:
      start_day: -25
      base_multiplier: 2.0
      peak_multiplier: 18.0
      decay_rate: 0.8
  intraday:
    enabled: true
    segments:
      - { name: late_night,     start: "00:00", end: "06:00", multiplier: 0.02 }
      - { name: early_morning,  start: "06:00", end: "08:30", multiplier: 0.15 }
      - { name: morning_spike,  start: "08:30", end: "11:30", multiplier: 1.8 }
      - { name: lunch_dip,      start: "11:30", end: "13:00", multiplier: 0.3 }
      - { name: afternoon,      start: "13:00", end: "16:00", multiplier: 1.2 }
      - { name: eod_rush,       start: "16:00", end: "18:30", multiplier: 1.5 }
      - { name: overtime,       start: "18:30", end: "22:00", multiplier: 0.3 }
      - { name: midnight,       start: "22:00", end: "23:59", multiplier: 0.05 }
  calendars:
    regions: [KR]

# A02 필수필드 누락 탐지용 — 결측값 주입
data_quality:
  enabled: true
  missing_values:
    enabled: true
    rate: 0.02
    strategy: mcar
    protected_fields: [document_id, company_code, posting_date]
  generate_labels: true

# C07 Benford 위반 등 통계적 이상 주입
anomaly_injection:
  enabled: true
  rates:
    total_rate: 0.05
    fraud_rate: 0.02
    error_rate: 0.02
    process_rate: 0.01

# 프로세스 배정 현실화 — generation_principles.md §2 기반
internal_controls:
  enabled: true
  sod_violation_rate: 0.01
  anomalous_assignment_rate: 0.015  # T4-17: 0.07→0.015 하향 (SoD 위반률 ≤2.0% 목표)
  compatible_extension_rate: 0.25   # 현실적 프로세스 겸직 확장 비율 (Senior 이상)

fraud:
  enabled: true
  fraud_rate: 0.02
  # B02/B08: KRW 승인한도 — 한국 중견 제조업 전결규정 반영
  # Level 1: 10M(자동) → Level 3: 1B(팀장) → Level 4: 5B(본부장) → Level 5: 10B(CFO) → Level 6: 50B(이사회)
  approval_thresholds: [10000000, 100000000, 1000000000, 5000000000, 10000000000, 50000000000]
  fraud_type_distribution:
    duplicate_payment: 0.20
    fictitious_transaction: 0.20
    revenue_manipulation: 0.15
    split_transaction: 0.15
    timing_anomaly: 0.10
    unauthorized_access: 0.10
    suspense_account_abuse: 0.05
    expense_capitalization: 0.05

# ═══════════════════════════════════════════════════════════════
# Anomaly Strategy Parameters — 전략별 임계값/파라미터 직접 제어
# Why: strategies.rs가 Default 대신 이 값을 읽어 YAML 변경이 실제 반영됨.
# ═══════════════════════════════════════════════════════════════
anomaly_strategies:
  approval:
    # B02/B03/B09 승인한도 (KRW, 오름차순)
    thresholds: [10000000, 100000000, 1000000000, 5000000000, 10000000000, 50000000000]
    buffer: 500000
  amount:
    min_multiplier: 2.0
    max_multiplier: 10.0
  date:
    max_backdate_days: 90
    max_future_days: 7
  split_transaction:
    threshold: 10000000
    buffer: 500000
  unbalanced:
    min_delta: 100     # A01 불균형 최소 금액 (KRW)
    max_delta: 1000    # A01 불균형 최대 금액 (KRW)
  invalid_account:
    codes: ["888888", "777777"]   # A03 무효 GL 코드
  revenue_manipulation:
    revenue_prefixes: ["4000", "4100", "4200", "4300", "4400", "4500", "4600"]
    min_zscore_multiplier: 3.0
    max_zscore_multiplier: 6.0
    floor_krw: 700000000     # high_amount와 동일 근거
    ceil_krw: 1500000000
  expense_capitalization:
    asset_accounts: ["1500", "1510", "1520", "1530", "1540", "1560", "1570", "1590"]
    expense_accounts: ["6000", "6100", "6200", "6300", "6400", "6500", "6600", "6700"]
  duplicate_payment:
    window_days: 30
  after_hours:
    start_hour: 22     # KST 심야 시작
    end_hour: 6        # KST 심야 종료
  high_amount:
    min_multiplier: 3.0
    max_multiplier: 6.0
    # Why: LogNormal(14.0, 2.5)의 mean+3σ ≈ 627M. floor/ceil은 Z>3σ 보장 범위.
    #      분포 파라미터(lognormal_mu/sigma) 변경 시 이 값도 재계산 필요.
    floor_krw: 700000000     # 7억원 (mean+3σ 약간 상회)
    ceil_krw: 2000000000     # 20억원
  dormant_account:
    accounts: ["199999", "299999", "399999", "999999"]
  description:
    # Why: detection C06은 risk_keywords.yaml의 high/medium 키워드로 판정.
    #      여기 목록은 risk_keywords.yaml과 동기화 필수.
    #      "Other", "Misc" 등 영어는 risk_keywords에 없어 미탐지됨.
    vague_descriptions:
      - "가계정"      # high_risk
      - "가수금"      # high_risk
      - "가지급"      # high_risk
      - "대여금"      # high_risk
      - "선급금"      # high_risk
      - "상품권"      # high_risk
      - "기타"        # medium_risk
      - "임시"        # medium_risk
      - "잡손실"      # medium_risk
      - "잡이익"      # medium_risk
      - "."           # description_quality=poor (noise)
      - "x"           # description_quality=poor (noise)

output:
  mode: flat_file
  output_directory: ../../data/journal/primary/datasynth
  formats:
    - csv
    - parquet
  compression:
    enabled: true
    algorithm: zstd
    level: 3
  include_acdoca: true
  include_bseg: false
  partition_by_period: false
