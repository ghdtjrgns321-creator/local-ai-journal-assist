# config/phase2_subdetector_tiers.yaml
# PHASE2 sub-detector evidence_tier 단일 출처 (lock 파일)
#
# 본 파일은 PHASE2 family ranking tie-break ladder의 max_subdetector_evidence_tier
# step (Layer 4 §5) 에서만 사용한다. tier는 truth recall 기준으로 조정하지 않는다.
# 각 항목의 source_type 은 standard (회계기준서 직접 인용) 또는 distribution
# (V7 fixed3 분포 측정값) 중 하나여야 하며, 두 출처 모두 비어 있지 않아야 한다.
#
# 변경 절차: docs/spec/DECISION.md D044 PR 템플릿의 "PHASE2 sub-detector tier
# 변경" fitting-risk check 통과 필수. tests/phase2_rulebase/
# test_subdetector_tiers_schema.py schema test 통과 필수.
#
# 관련 문서:
#   - dev/active/phase2-family-ranking/phase2-family-ranking-plan.md §L5
#   - docs/spec/PHASE2_GOVERNANCE_DESIGN.md (결정 8 예정)
#   - docs/spec/PHASE2_INTERFACE_DESIGN.md §4.4

schema_version: 1
last_updated: 2026-05-25  # 결정 9 (timeseries role lock) 메타 필드 추가

# tier 의미:
#   strong         — 기준서 직접 매핑 또는 분포 변별력 높음. 단독으로도 review queue 진입 근거.
#   moderate       — 기준서 간접 매핑 또는 임계값 의존. 보강 증거가 함께 필요.
#   weak           — 분포 변별력 낮음 또는 false positive 위험 높음. tie-break 최하위.
#   ml_quantile    — ML 모델 점수. tier 값은 case 내부 score quantile 로 동적 결정.
#                    tie-break ladder 의 max_subdetector_evidence_tier 단계에서는 분기하지 않고,
#                    max_family_ecdf 단계에서 처리.
allowed_tiers:
  - strong
  - moderate
  - weak
  - ml_quantile

allowed_source_types:
  - standard
  - distribution

sub_detectors:
  - family: unsupervised
    code: VAE-01
    label: audit_vae_reconstruction
    tier: ml_quantile
    source_type: distribution
    source_citation: "AUROC 0.9300 (V7 fixed3 3년 평균, docs/guide/DETECTION_RESULTS_MANIPULATION_V7_FIXED3_PHASE2.md §2)"
    distribution_metric: "row_nonzero_rate=99.9999%, q95=0.9712, q99=0.9935 (artifacts/phase2_family_correlation_matrix_20260519.json)"
    rationale: "단일 ML model. tier 분기는 score quantile 로 동적 처리, tie-break ladder 는 max_family_ecdf 단계 사용."

  - family: timeseries
    code: TS01
    label: transaction_burst
    tier: moderate
    source_type: standard
    source_citation: "ISA 240 ¶A41 — unusual transactions including those occurring at end of period or near the period under audit"
    distribution_metric: "PRE-MIGRATION: V7 fixed3 timeseries family score 0.4/0.8 이산값 (artifacts/phase2_family_correlation_matrix_20260519.md). POST-MIGRATION REMEASUREMENT PENDING — 2026-05-24 이후 detector 가 robust z + zero-preserving ECDF continuous score 를 산출 (docs/spec/phase2_reorgani.md §timeseries). 새 분포 측정 후 D044 PR 로 갱신."
    rationale: "단기 burst 는 기준서 인용 가능하나 임계 window 의존. 단독으로 high band 진입 금지."
    # ── role lock (결정 9, 2026-05-25) ──
    # timeseries family 는 결산/시점 컨텍스트 lane 으로 역할 고정. TOP100/500 단독 ranker 추격 금지.
    # 변경 시: docs/spec/PHASE2_TIMESERIES_ROLE_LOCK.md §변경 절차 통과 필수.
    role_lock: context_lane
    ranker_use: top2000_plus_context
    do_not_tune_for_top_recall: true
    coverage_profile: "TOP100~500 단독 약함, TOP2000+ 보조 coverage 회복 (결산/시점 컨텍스트 lane)"
    batch_local_ecdf_caveat: "현 ECDF 는 inference batch 분포 기준. 회사별 routine closing calendar baseline 미적용 — 정상 결산 이벤트와 조작 결산 이벤트가 분포상 겹칠 수 있음. routine closing calendar profile 은 후속 과제."

  - family: timeseries
    code: TS02
    label: unusual_frequency
    tier: weak
    source_type: distribution
    source_citation: "PRE-MIGRATION measurement: row_nonzero_rate=87.23% (timeseries 전체), q90=q95=0.8 — 분해능 매우 낮음. POST-MIGRATION REMEASUREMENT PENDING — 2026-05-24 detector 변경 (docs/spec/phase2_reorgani.md §timeseries) 후 분포 재측정 필요."
    distribution_metric: "PRE-MIGRATION: V7 fixed3 measurement, timeseries family score 의 86% 행 hit, top_tail tie 지배 (artifacts/phase2_family_correlation_matrix_20260519.json). POST-MIGRATION REMEASUREMENT PENDING — robust z + ECDF 적용 후 분해능 변경 예상, 운영 측정 후 D044 PR 로 갱신."
    rationale: "분포 변별력 낮음. coarse-booster 강제 사유. 단독 ranker 사용 금지."
    # ── role lock (결정 9, 2026-05-25) ──
    role_lock: context_lane
    ranker_use: top2000_plus_context
    do_not_tune_for_top_recall: true
    coverage_profile: "TOP100~500 단독 약함, TOP2000+ 보조 coverage 회복 (빈도 컨텍스트 lane)"
    batch_local_ecdf_caveat: "현 ECDF 는 inference batch 분포 기준. 회사별 routine batch 시각대 baseline 미적용 — 정상 batch 일괄기표 와 비정상 빈도 패턴이 분포상 겹칠 수 있음. routine batch calendar baseline 은 후속 과제."

  - family: duplicate
    code: L2-03a
    label: exact_duplicate_amount
    tier: strong
    source_type: standard
    source_citation: "PCAOB AS 2401 §B7 — transactions that are duplicates of others; AS 2401 .A6 (1)"
    distribution_metric: "V7 fixed3 2024 hit=2,964 (전체의 0.87%) — deterministic precision, false positive 최소"
    rationale: "정확 중복은 PCAOB AS 2401 직접 인용 + deterministic 매칭. 단독 review 가능."

  - family: duplicate
    code: L2-03b
    label: fuzzy_duplicate
    tier: moderate
    source_type: standard
    source_citation: "PCAOB AS 2401 §B7 (보조) — near-duplicate transactions; RapidFuzz threshold 의존"
    distribution_metric: "V7 fixed3 2024 hit=34,655 — fuzzy threshold 의존, 정상 routine 거래 포함 가능. PHASE1-1 L2-03 primary에서는 제외되고 duplicate family 보조 신호로만 해석."
    rationale: "유사 중복은 fuzzy threshold 임의성. PHASE1-1 binary 재기표 룰이 아니라 PHASE1-2 duplicate family 보조 evidence로만 사용."

  - family: duplicate
    code: L2-03c
    label: split_transaction
    tier: moderate
    source_type: standard
    source_citation: "PCAOB AS 2401 §B7 (보조) — split transactions to circumvent approval thresholds"
    distribution_metric: "V7 fixed3 2024 hit=16,784 — date window·two-sum range 의존 (Diag-2 후 최적화)"
    rationale: "분할 거래는 구조 단위 신호이므로 PHASE1-1 row primary가 아니라 PHASE1-2 structuring/duplicate family 보조 evidence로 해석."

  - family: duplicate
    code: L2-03d
    label: time_shifted_duplicate
    tier: weak
    source_type: distribution
    source_citation: "V7 fixed3 2024 hit=28,590 — date sliding window·amount bucket 의존도 높음"
    distribution_metric: "duplicate family q95=0.5985, q99=0.6 — 분해능 cap, ranking 변별력 약함"
    rationale: "시차 중복은 window 임의성 + amount bucket 의존. 단독 사용 시 false positive 위험. weak."
