# config/phase1_case.yaml
# PHASE1 결과를 rule list가 아니라 case/theme queue로 묶고 우선순위화할 때 쓰는 전용 설정

phase1_case:
  secondary_tag_min_score: 0.40

  counterparty_columns:
    - auxiliary_account_number
    - vendor_name
    - customer_name
  counterparty_fallback: UNKNOWN_COUNTERPARTY

  account_family_strategy: first_digit
  account_family_fallback_order:
    - account_family
    - first_digit
    - gl_account_prefix_2
    - gl_account_prefix_3
  account_family_fallback: UNKNOWN_ACCOUNT_FAMILY

  near_period_days: 7
  period_end_window_days: 5
  intercompany_pair_columns:
    - company_code
    - trading_partner
  load_batch_columns:
    - upload_batch_id

  priority_weights:
    control: 0.35
    amount: 0.30
    logic: 0.20
    behavior: 0.15

  materiality_amount: 0

  priority_band:
    high: 0.75
    medium: 0.45

  priority_floors:
    - rule_id: L1-05
      labels:
        - immediate
        - escalated_materiality
        - escalated_abnormal_time
        - escalated_high_risk_account
      min_priority_score: 0.80
      reason: critical_self_approval
    - rule_id: L1-04
      min_raw_score: 0.80
      min_priority_score: 0.75
      reason: approval_limit_exceeded
    - rule_id: L1-06
      min_raw_score: 0.80
      min_priority_score: 0.75
      reason: immediate_sod_violation
    - rule_id: L1-07
      labels:
        - immediate
      min_priority_score: 0.75
      reason: skipped_approval_immediate

  priority_adjustments:
    enabled: true
    topside:
      require_manual: true
      medium_threshold: 0.40
      medium_bonus: 0.10
      high_threshold: 0.60
      high_bonus: 0.20
    batch_combo:
      medium_group_count: 2
      medium_bonus: 0.08
      medium_behavior_floor: 0.70
      high_group_count: 3
      high_bonus: 0.15
      high_behavior_floor: 1.00
    weak_evidence:
      require_strong_evidence: true
      per_tag_bonus: 0.03
      max_bonus: 0.09
      boolean_columns:
        - is_round_number
        - is_rare_account
        - significant_unusual_transaction
        - is_period_end_manual
        - sensitive_account_touch
      include_l3_08_as_weak_description: true
      derive_manual_period_end: true
    rare_account_pair:
      l404_only_penalty: 0.10
      recurring_source_penalty: 0.08
      recurring_source_ratio: 0.60
      recurring_sources:
        - recurring
        - automated
        - batch
        - interface
        - system

  repeat_score_promote: 0.70
  repeat_months_tiebreak: 3

  timing_priority:
    l304_only_penalty: 0.20
    l304_sensitive_bonus: 0.15
    l304_high_amount_bonus: 0.10
    l304_combo_bonus: 0.20
    l304_repeat_pattern_penalty: 0.15
    l304_repeat_pattern_repeat_cap: 0.30
    l304_high_amount_case_score: 0.75
    l304_repeat_pattern_min_months: 3
    l304_repeat_pattern_max_amount_cv: 0.35
    l304_repeat_pattern_min_signature_share: 0.60
    l304_sensitive_account_prefixes:
      - "4"
      - "12"
      - "1150"
      - "2050"
      - "2700"

  evidence_type_cap: 1.0
  rule_repeat_scale: sqrt

  top_n_cases: 50
  top_n_per_theme: 10
