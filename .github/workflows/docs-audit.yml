name: Docs Audit

on:
  pull_request:
    paths:
      - "docs/DECISION.md"
      - "docs/CONSTRAINTS.md"
      - "src/preprocessing/constants.py"
      - "tools/scripts/audit_decision_ids.py"
      - "tools/scripts/audit_leakage_deny_rules.py"
      - ".github/workflows/docs-audit.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "docs/DECISION.md"
      - "docs/CONSTRAINTS.md"
      - "src/preprocessing/constants.py"
      - "tools/scripts/audit_decision_ids.py"
      - "tools/scripts/audit_leakage_deny_rules.py"
      - ".github/workflows/docs-audit.yml"

jobs:
  decision-ids:
    name: DECISION.md ID 유일성 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit DECISION.md D<n> headers
        run: |
          python tools/scripts/audit_decision_ids.py docs/DECISION.md
      - name: Audit LEAKAGE_DENY_RULES docs sync
        run: |
          python tools/scripts/audit_leakage_deny_rules.py
