name: Phase 2 Evaluation Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase2-eval-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Install core dependencies
        run: uv sync --group core
      - name: Check Phase 2 report conclusion language
        run: |
          uv run python -m src.evaluation.phase2_report --check-markdown \
            artifacts/phase2_evaluation_report.md \
            docs/phase2_evaluation_report.md
