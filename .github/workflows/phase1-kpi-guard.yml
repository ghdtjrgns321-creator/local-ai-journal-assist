name: phase1-kpi-guard

# PHASE1 nightly KPI guard — Layer A/B/C 3계층 가드.
#
# 트리거:
#   - PR 대상 main / develop  (Layer A/B HARD FAIL = PR 차단, Layer C SOFT WARN = PR 코멘트)
#   - main 머지 시점 (post-merge 검증, 회귀 발생 시 issue 자동 생성)
#   - weekly cron (월요일 09:00 UTC, fixture freshness 회귀 감시)
#
# 원칙 (CLAUDE.md PHASE1 역할 원칙):
#   PHASE1 향상은 도메인 정합성으로만 정당화. truth recall 향상을 강제하는 가드 금지.
#   Layer C 가드는 baseline 70% 비율 하한 SOFT WARN 만 (절대값 임계 금지).
#
# baseline 갱신 절차:
#   tests/phase1_rulebase/kpi_baseline.json 직접 편집 PR. description에 변경 사유 +
#   도메인 정당성(회계 실무 / 감사기준서) 명시 의무. truth recall 향상을 baseline
#   갱신 직접 사유로 사용 금지.
#
# Layer C SOFT WARN 누적 대응:
#   - PR: 코멘트만 남기고 차단하지 않음
#   - main/schedule/workflow_dispatch 3회 연속: kpi-guard issue 자동 생성
#   - 6회 연속: baseline 갱신 PR 또는 회귀 원인 분석 docs 의무

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/detection/**"
      - "config/phase1_case.yaml"
      - "config/settings.py"
      - "tests/phase1_rulebase/**"
      - "tools/scripts/profile_phase1_v126.py"
      - "tools/scripts/materialize_datasynth_manipulation_v2.py"
      - "tools/scripts/build_datasynth_v13*.py"
      - "artifacts/phase1_manipulation_v2_*"
      - "artifacts/phase1_contract_v2_*"
  push:
    branches:
      - main
  schedule:
    # 매주 월요일 09:00 UTC (한국 시간 18:00)
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  kpi-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync dev dependencies
        run: uv sync --group core --group dev --group dashboard

      - name: Restore Layer C soft warn history
        id: softwarn-history-restore
        uses: actions/cache/restore@v4
        with:
          path: artifacts/_kpi_guard_softwarn_history.json
          key: kpi-guard-softwarn-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            kpi-guard-softwarn-${{ github.ref_name }}-

      - name: Layer A + B (HARD FAIL)
        id: hard
        shell: bash
        run: |
          set -o pipefail
          uv run pytest tests/phase1_rulebase/nightly_kpi_guard.py \
            -v \
            -k "TestLayerADomainIntegrity or TestLayerBOperationalLoad or TestGuardMetaIntegrity" \
            --tb=short \
            2>&1 | tee artifacts/_kpi_guard_hard.log

      - name: Layer C (SOFT WARN, never fails)
        id: soft
        if: always()
        continue-on-error: true
        run: |
          uv run pytest tests/phase1_rulebase/nightly_kpi_guard.py \
            -v \
            -k "TestLayerCTruthRegressionSoftWarn" \
            -W "default::UserWarning" \
            --tb=no \
            2>&1 | tee artifacts/_kpi_guard_soft.log

      - name: Update Layer C soft warn history
        id: soft_history
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'artifacts/_kpi_guard_softwarn_history.json';
            let softLog = '';
            try { softLog = fs.readFileSync('artifacts/_kpi_guard_soft.log', 'utf8'); } catch (_) {}
            const softWarns = (softLog.match(/SOFT WARN/g) || []).length;
            let history = {
              consecutive_count: 0,
              last_soft_warn_count: 0,
              last_run_id: null,
              last_sha: null,
              milestones_opened: [],
              runs: [],
            };
            try {
              history = { ...history, ...JSON.parse(fs.readFileSync(path, 'utf8')) };
            } catch (_) {}

            const previousCount = Number(history.consecutive_count || 0);
            const consecutive = softWarns > 0 ? previousCount + 1 : 0;
            const milestone = consecutive >= 6 ? 6 : (consecutive >= 3 ? 3 : 0);
            // 정상 run(softWarns === 0)으로 streak가 끊기면 milestones lineage도 초기화한다.
            // 이후 같은 회귀가 다시 누적되면 새로운 streak로 보고 milestone 3/6 issue가 재발화된다.
            // 정책 단일 출처: docs/spec/CONSTRAINTS.md §"SOFT WARN 누적 대응 절차" — 옵션 A (streak-reset).
            const milestonesOpened = softWarns === 0
              ? []
              : (Array.isArray(history.milestones_opened) ? history.milestones_opened : []);
            const shouldCreateIssue =
              context.eventName !== 'pull_request'
              && softWarns > 0
              && milestone > 0
              && !milestonesOpened.includes(milestone);

            const runRecord = {
              run_id: context.runId,
              event_name: context.eventName,
              sha: context.sha,
              ref: context.ref,
              soft_warn_count: softWarns,
              consecutive_count: consecutive,
              observed_at: new Date().toISOString(),
            };
            const runs = Array.isArray(history.runs) ? history.runs : [];
            runs.push(runRecord);
            const nextHistory = {
              ...history,
              consecutive_count: consecutive,
              last_soft_warn_count: softWarns,
              last_run_id: context.runId,
              last_sha: context.sha,
              last_ref: context.ref,
              updated_at: runRecord.observed_at,
              milestones_opened: shouldCreateIssue
                ? [...milestonesOpened, milestone]
                : milestonesOpened,
              runs: runs.slice(-12),
            };
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync(path, JSON.stringify(nextHistory, null, 2) + '\n');

            core.setOutput('soft_warns', String(softWarns));
            core.setOutput('consecutive_count', String(consecutive));
            core.setOutput('milestone', String(milestone));
            core.setOutput('should_create_issue', shouldCreateIssue ? 'true' : 'false');

      - name: Upload guard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-guard-logs
          path: artifacts/_kpi_guard_*.log
          retention-days: 30

      - name: PR comment — Layer A/B/C summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let hardLog = '';
            let softLog = '';
            try { hardLog = fs.readFileSync('artifacts/_kpi_guard_hard.log', 'utf8'); } catch (_) {}
            try { softLog = fs.readFileSync('artifacts/_kpi_guard_soft.log', 'utf8'); } catch (_) {}
            const hardPass = !hardLog.includes('FAILED') && hardLog.includes('passed');
            const softWarns = (softLog.match(/SOFT WARN/g) || []).length;
            const verdict = hardPass
              ? '✅ Layer A/B HARD PASS'
              : '❌ Layer A/B HARD FAIL — PR 차단';
            const layerCMsg = softWarns > 0
              ? `⚠️ Layer C SOFT WARN ${softWarns}건 (검토 권장, 차단 아님)`
              : '✅ Layer C 회귀 없음';
            const body = [
              '## PHASE1 KPI Guard',
              '',
              `**Layer A/B (HARD)**: ${verdict}`,
              `**Layer C (SOFT WARN)**: ${layerCMsg}`,
              '',
              '<details><summary>Layer A/B 로그</summary>',
              '',
              '```',
              hardLog.split('\n').slice(-40).join('\n'),
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Layer C 로그</summary>',
              '',
              '```',
              softLog.split('\n').slice(-40).join('\n'),
              '```',
              '',
              '</details>',
              '',
              '> **원칙**: PHASE1 향상은 도메인 정합성으로만 정당화. Layer C 는 회귀 방지선 (SOFT WARN), 향상 강제 금지.',
              '> baseline 갱신은 `tests/phase1_rulebase/kpi_baseline.json` 편집 PR + 도메인 사유 명시.',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Issue — Layer C consecutive SOFT WARN
        if: steps.soft_history.outputs.should_create_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const softWarns = Number('${{ steps.soft_history.outputs.soft_warns }}');
            const consecutive = Number('${{ steps.soft_history.outputs.consecutive_count }}');
            const milestone = Number('${{ steps.soft_history.outputs.milestone }}');
            let softLog = '';
            let history = '';
            try { softLog = fs.readFileSync('artifacts/_kpi_guard_soft.log', 'utf8'); } catch (_) {}
            try { history = fs.readFileSync('artifacts/_kpi_guard_softwarn_history.json', 'utf8'); } catch (_) {}
            const requiredAction = milestone >= 6
              ? 'baseline 갱신 PR을 열거나 회귀 원인 분석 docs를 작성하세요. fitting 위험이 확인되면 변경을 롤백하세요.'
              : 'Layer C SOFT WARN이 3회 연속 발생했습니다. 회귀 원인을 확인하고 kpi_baseline 갱신 필요성을 검토하세요.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[KPI Guard] Layer C SOFT WARN ${consecutive} consecutive runs (${context.sha.substring(0,7)})`,
              labels: ['kpi-guard', 'phase1', 'soft-warn'],
              body: [
                '## Layer C SOFT WARN 누적 대응',
                '',
                `commit: \`${context.sha}\``,
                `workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `soft warns in this run: ${softWarns}`,
                `consecutive count: ${consecutive}`,
                '',
                '### required action',
                requiredAction,
                '',
                '### Layer C 로그',
                '```',
                softLog.split('\n').slice(-80).join('\n'),
                '```',
                '',
                '<details><summary>soft warn history</summary>',
                '',
                '```json',
                history,
                '```',
                '',
                '</details>',
              ].join('\n'),
            });

      - name: Save Layer C soft warn history
        if: always() && github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: artifacts/_kpi_guard_softwarn_history.json
          key: kpi-guard-softwarn-${{ github.ref_name }}-${{ github.run_id }}

      - name: Post-merge issue — Layer A/B regression
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.hard.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('artifacts/_kpi_guard_hard.log', 'utf8'); } catch (_) {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[KPI Guard] Layer A/B regression on main (${context.sha.substring(0,7)})`,
              labels: ['kpi-guard', 'regression', 'phase1'],
              body: [
                '## post-merge KPI Guard 회귀',
                '',
                `commit: \`${context.sha}\``,
                `workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### 로그',
                '```',
                log.split('\n').slice(-60).join('\n'),
                '```',
              ].join('\n'),
            });
